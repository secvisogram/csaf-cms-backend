###############################################################################
#          For development purposes only, do not use in production            #
###############################################################################

services:
  cms-couchdb:
    image: couchdb:3.4
    restart: on-failure
    env_file: .env
    environment:
      COUCHDB_USER: ${CSAF_COUCHDB_USER}
      COUCHDB_PASSWORD: ${CSAF_COUCHDB_PASSWORD}
    volumes:
      - ./data/cms-db:/opt/couchdb/data
    ports:
      - "${CSAF_COUCHDB_PORT}:5984"
    healthcheck:
      test: ["CMD-SHELL", "curl http://127.0.0.1:5984/_up || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10


  keycloak-db:
    image: postgres:17-alpine
    container_name: keycloak-db
    volumes:
      - ./data/keycloak-db:/var/lib/postgresql/data
    env_file: .env
    environment:
      POSTGRES_DB: ${CSAF_KEYCLOAK_DATABASE_NAME}
      POSTGRES_USER: ${CSAF_KEYCLOAK_DATABASE_USER}
      POSTGRES_PASSWORD: ${CSAF_KEYCLOAK_DATABASE_PASSWORD}
    restart: on-failure
    ports:
      - "${CSAF_KEYCLOAK_DATABASE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 10s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.4
    env_file: .env
    environment:
      # https://www.keycloak.org/server/all-config
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_SCHEMA: public

      KC_DB_URL_HOST: keycloak-db
      KC_DB_URL_PORT: 5432
      KC_DB_URL_DATABASE: ${CSAF_KEYCLOAK_DATABASE_NAME}
      
      KC_DB_USERNAME: ${CSAF_KEYCLOAK_DATABASE_USER}
      KC_DB_PASSWORD: ${CSAF_KEYCLOAK_DATABASE_PASSWORD}
      
      KC_BOOTSTRAP_ADMIN_USERNAME: ${CSAF_KEYCLOAK_ADMIN_USER}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${CSAF_KEYCLOAK_ADMIN_PASSWORD}

      KC_HOSTNAME: ${CSAF_KEYCLOAK_CLIENT_HOSTNAME}
      KC_HOSTNAME_ADMIN: ${CSAF_KEYCLOAK_ADMIN_HOSTNAME}

    healthcheck:
      start_period: 120s
      test:
        ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/8080'", ]
      interval: 10s
      timeout: 10s
      retries: 10
    depends_on:
      keycloak-db:
        condition: service_healthy
        restart: true
    restart: on-failure
    ports:
      - "${CSAF_KEYCLOAK_PORT}:8080"
    volumes:
      - ./config/keycloak/csaf-realm.json:/opt/keycloak/import-template/csaf-realm.json:ro
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        : "$${CSAF_CLIENT_SECRET:?CSAF_CLIENT_SECRET must be set}"
        mkdir -p /opt/keycloak/data/import
        tpl=$$(cat /opt/keycloak/import-template/csaf-realm.json)
        printf '%s' "$${tpl//__CSAF_CLIENT_SECRET__/$${CSAF_CLIENT_SECRET}}" > /opt/keycloak/data/import/csaf-realm.json
        exec /opt/keycloak/bin/kc.sh start-dev --verbose --import-realm

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.12.0-alpine
    container_name: oauth2-proxy
    env_file: .env
    environment:
      # listening address and proxy target
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      # Points at the csaf-cms-backend container by default. For debugging, stop that container,
      # set CSAF_CMS_BACKEND_HOST=host.docker.internal in .env, and restart this service.
      OAUTH2_PROXY_UPSTREAMS: "http://${CSAF_CMS_BACKEND_HOST}:${CSAF_CMS_BACKEND_PORT}/api/v1/"
      
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      
      # Security related config
      OAUTH2_PROXY_COOKIE_SECURE: "false"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      OAUTH2_PROXY_COOKIE_REFRESH: "4m"
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"

      # OIDC provider config
      OAUTH2_PROXY_PROVIDER: oidc
      OAUTH2_PROXY_PROVIDER_DISPLAY_NAME: "CSAF OIDC Provider"
      # You need to set your keycloak "Frontend URL", in our case "http://localhost:9000/auth/"
      # If you don't want to use autodiscovery, you have to set all urls by hand (login-url, oidc-jwks-url, redeem-url, ...)
      
      OAUTH2_PROXY_SKIP_OIDC_DISCOVERY: "true"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "http://keycloak:8080/realms/${CSAF_REALM}"
      OAUTH2_PROXY_LOGIN_URL: "http://localhost/realms/csaf/protocol/openid-connect/auth"
      OAUTH2_PROXY_REDEEM_URL: "http://keycloak:8080/realms/csaf/protocol/openid-connect/token"
      OAUTH2_PROXY_OIDC_JWKS_URL: http://keycloak:8080/realms/csaf/protocol/openid-connect/certs
      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      
      OAUTH2_PROXY_WHITELIST_DOMAINS: "localhost:4180,localhost:8080,localhost,localhost:80"

      # Client credentials
      OAUTH2_PROXY_CLIENT_ID: ${CSAF_CLIENT_ID}
      # Fixed dev secret, shared with the Keycloak realm import (see CSAF_CLIENT_SECRET in .env).
      OAUTH2_PROXY_CLIENT_SECRET: ${CSAF_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${CSAF_COOKIE_SECRET}
      OAUTH2_PROXY_INSECURE_OIDC_ALLOW_UNVERIFIED_EMAIL: "true"

      # Pass ID token to upstream
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "true"
      OAUTH2_PROXY_PASS_BASIC_AUTH: "false"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"

      # Built-in authorization checks (disabled)
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
    healthcheck:
      test: [ "CMD-SHELL", "wget -O /dev/null http://127.0.0.1:4180/ping || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    ports:
      - "${CSAF_APP_EXTERNAL_PORT}:4180"
    #    Remove comments for the next two line if there are issues with connections between the containers and the host
    #    This is a Linux Docker Engine pattern — on Linux there's no VM, so host.docker.internal doesn't exist by default
    #    and you need host-gateway to create it. On Docker Desktop (Windows/macOS) it's unnecessary and can break things.
    #    extra_hosts:
    #      - "host.docker.internal:host-gateway"
    restart: on-failure
    depends_on:
      keycloak:
        condition: service_healthy
    
  validator:
    image: ghcr.io/secvisogram/csaf-validator-service:sha-369e837
    env_file: .env
    ports:
      - "$CSAF_VALIDATOR_PORT:8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://127.0.0.1:8082/api/v1/tests || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10 

  backend-cms:
    image: ghcr.io/secvisogram/csaf-cms-backend:latest
    build:
      context: ..
      dockerfile: alpine.Dockerfile
    env_file: ../.env
    environment:
      # Internal service names, only reachable from inside this container. The values in ../.env
      # (localhost-based) remain correct for running the backend on the host via
      # "./mvnw spring-boot:run" during debugging.
      CSAF_COUCHDB_HOST: cms-couchdb
      CSAF_VALIDATION_BASE_URL: "http://validator:8082/api/v1"
      CSAF_OIDC_JWKS_URL: "http://keycloak:8080/realms/${CSAF_REALM}/protocol/openid-connect/certs"
      CSAF_AUTOPUBLISH_URL: "http://reverse-proxy/cgi-bin/csaf_provider.go/api/upload"
    volumes:
      # Dev fixture files referenced by CSAF_TEMPLATES_FILE / CSAF_COMPANY_LOGO_PATH; mounted at
      # the same relative path so the default .env values keep working unmodified.
      - "../src/test/resources:/app/src/test/resources:ro"
    ports:
      - "${CSAF_CMS_BACKEND_PORT}:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://127.0.0.1:8081/api/v1/about || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    depends_on:
      cms-couchdb:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    restart: on-failure

  secvisogram:
    image: ghcr.io/secvisogram/secvisogram:sha-2dac158
    volumes:
      - "./config/secvisogram/appspecific:/usr/share/nginx/html/.well-known/appspecific:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  reverse-proxy:
    image:  nginx:1.27-alpine
    restart: on-failure
    ports:
      - "80:80" 
    volumes:
      - "./config/reverseproxy/nginx.conf:/etc/nginx/nginx.conf:ro"
    healthcheck:
        test: ["CMD-SHELL", "wget -O /dev/null http://127.0.0.1 || exit 1"]
        interval: 10s
        timeout: 10s
        retries: 10
    depends_on:
      secvisogram:
        condition: service_healthy
      keycloak: 
        condition: service_healthy
      oauth2-proxy:
        condition: service_healthy
      validator:
        condition: service_healthy
      backend-cms:
        condition: service_healthy

  trusted-provider:
    build:
      context: ./container/trustedprovider
      dockerfile: Dockerfile
    env_file: 
      - .env
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=Europe/Berlin
    volumes:
      - ./config/trustedprovider/provider-config.toml:/config/provider-config.toml:ro
      - ./config/trustedprovider/private.asc:/config/private.asc:ro
      - ./config/trustedprovider/public.asc:/config/public.asc:ro
      - ./data/trustedprovider/:/data/
    healthcheck:
        # Check that nginx is listening — use nc to test TCP port only,
        # since the root URL returns 404 before trusted-provider-setup has run.
        test: ["CMD-SHELL", "nc -z 127.0.0.1 80 || exit 1"]
        interval: 10s
        timeout: 10s
        retries: 10

  trusted-provider-setup:
    build:
      context: ./container/uploader
      dockerfile: Dockerfile
    container_name: "trusted-provider-setup"
    restart: "no"
    profiles: [ "run_manually" ]
    volumes:
      - ./config/uploader/config-create.toml:/config/config.toml:ro
    environment:
      - OPTIONS=--config=/config/config.toml
    entrypoint: ["/opt/csaf_uploader", "--config=/config/config.toml"]
    depends_on:
      trusted-provider:
        condition: service_healthy
    
