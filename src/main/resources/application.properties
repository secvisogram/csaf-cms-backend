server.port=${CSAF_CMS_BACKEND_PORT:8081}

springdoc.api-docs.path=/api-docs
# Specify the path of the Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
# Enable or disable Swagger UI
springdoc.swagger-ui.enabled=true

logging.level.org.springframework.security=DEBUG

csaf.csrf.enabled=${CSAF_CMS_BACKEND_CSRF_ENABLED:true}

# s. https://github.com/spring-projects/spring-boot/wiki/Spring-Boot-2.6-Release-Notes#pathpattern-based-path-matching-strategy-for-spring-mvc
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
spring.config.import=optional:file:.env[.properties]
csaf.couchdb.host=${CSAF_COUCHDB_HOST:localhost}
csaf.couchdb.port=${CSAF_COUCHDB_PORT:5984}
csaf.couchdb.ssl=${CSAF_COUCHDB_SSL:false}
csaf.couchdb.dbname=${CSAF_COUCHDB_DBNAME:csaf}
csaf.couchdb.user=${CSAF_COUCHDB_USER:admin}
csaf.couchdb.password=${CSAF_COUCHDB_PASSWORD:admin}

# keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=${CSAF_OIDC_ISSUER_URL:http://localhost/realms/csaf}

# templates
csaf.document.templates.file=${CSAF_TEMPLATES_FILE:./templates/allTemplates.json}
csaf.document.templates.companyLogoPath=${CSAF_COMPANY_LOGO_PATH:}

# versioning
csaf.document.versioning=${CSAF_VERSIONING:Semantic}

# revision history
csaf.summary.publication=${CSAF_SUMMARY_PUBLICATION:Initial Publication}

# validation
csaf.validation.baseurl=${CSAF_VALIDATION_BASE_URL:http://localhost/validate/api/v1/}

# max. levenshtein distance between changed values in the csaf document to decide whether a change is a patch or a minor change
csaf.versioning.levenshtein=${CSAF_VERSIONING_LEVENSHTEIN:4}

# generation of /document/tracking/id's

# Base URL (of the server hosting the documents)
csaf.references.baseURL=${CSAF_REFERENCES_BASE_URL:http://example.com}
# Company code in the generated tracking id
csaf.trackingid.company=${CSAF_TRACKINGID_COMPANY:ExampleInc}
# Number of digits of the sequential number of the tracking id. Missing digits are filled with zeros
csaf.trackingid.digits=${CSAF_TRACKINGID_DIGITS:}


csaf.autoPublish.enabled=${CSAF_AUTOPUBLISH_ENABLED:true}
csaf.autoPublish.enableInsecureTLS=${CSAF_AUTOPUBLISH_INSECURETLS:false}
csaf.autoPublish.url=${CSAF_AUTOPUBLISH_URL:http://localhost/cgi-bin/csaf_provider.go/api/upload}
# autoPublish: the password must be the PLAINTEXT password.
# PublishJob sends a fresh BCrypt hash of this password in the X-Csaf-Provider-Auth header ot the gocsaf provider
csaf.autoPublish.password=${CSAF_AUTOPUBLISH_PASSWORD:secretpassword}
csaf.autoPublish.cron=${CSAF_AUTOPUBLISH_CRON:0 * * * * *}
# workflow
# When false (default), a Reviewer or Publisher cannot approve (Review -> Approved) their own advisory,
# enforcing peer-review. Set to true to allow own-document approval.
csaf.workflow.allow-own-documents-approved=${CSAF_WORKFLOW_ALLOW_OWN_DOCUMENTS_APPROVED:false}
# When false (default), only a JSON reference is added to document/references on first publish.
# Set to true to also add an HTML reference pointing to the .html variant of the published document.
csaf.workflow.create-html-reference=${CSAF_WORKFLOW_CREATE_HTML_REFERENCE:false}
